<!DOCTYPE html><html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}StayFlix{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#111827;--card:#1f2937;--txt:#f9fafb;--txt3:#9ca3af;--bdr:rgba(255,255,255,.09)}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:14px}
.inp{background:#0f172a;border:1px solid rgba(255,255,255,.1);color:var(--txt);border-radius:9px;padding:9px 13px;font-size:13.5px;width:100%;transition:.15s;font-family:inherit;outline:none}
.inp:focus{border-color:rgba(99,102,241,.55);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 20px;border-radius:9px;font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all .15s;text-decoration:none;font-family:inherit}
.btn-red{background:linear-gradient(135deg,#E50914,#b91c1c);color:#fff;box-shadow:0 4px 16px rgba(229,9,20,.3)}.btn-red:hover{filter:brightness(1.1);transform:translateY(-1px)}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;border:1px solid}
.badge-admin{background:rgba(239,68,68,.18);color:#fca5a5;border-color:rgba(239,68,68,.2)}
.badge-manager{background:rgba(245,158,11,.18);color:#fcd34d;border-color:rgba(245,158,11,.2)}
.badge-analyst{background:rgba(59,130,246,.18);color:#93c5fd;border-color:rgba(59,130,246,.2)}
.badge-viewer{background:rgba(148,163,184,.18);color:#cbd5e1;border-color:rgba(148,163,184,.2)}
.alert{border-radius:10px;padding:11px 15px;margin-bottom:12px;font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:9px}
.alert-success{background:rgba(5,150,105,.14);border:1px solid rgba(5,150,105,.28);color:#6ee7b7}
.alert-danger{background:rgba(220,38,38,.14);border:1px solid rgba(220,38,38,.28);color:#fca5a5}
.alert-warning{background:rgba(217,119,6,.14);border:1px solid rgba(217,119,6,.28);color:#fcd34d}
.alert-info{background:rgba(99,102,241,.14);border:1px solid rgba(99,102,241,.28);color:#a5b4fc}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
</style></head><body>
{% with messages=get_flashed_messages(with_categories=true) %}{% for cat,msg in messages %}<div style="position:fixed;top:16px;right:16px;z-index:9999;max-width:360px" class="alert alert-{{ cat }}"><i class="fa-solid fa-circle-info"></i>{{ msg }}</div>{% endfor %}{% endwith %}
{% block content %}{% endblock %}
</body></html>
